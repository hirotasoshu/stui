name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build with xgo
        uses: crazy-max/ghaction-xgo@v3
        with:
          xgo_version: latest
          go_version: "1.25"
          dest: build
          prefix: stui
          pkg: ./cmd/stui
          targets: windows/amd64,windows/arm64,linux/amd64,linux/arm64,linux/386
          ldflags: -s -w
          trimpath: true

      - name: Prepare Release Packages
        run: |
          mkdir dist

          for bin in build/*; do
            filename=$(basename "$bin")

            # example: stui-windows-amd64.exe
            platform=$(echo "$filename" | sed -E 's/stui-(.*)(\.exe)?/\1/')

            mkdir -p "release-$platform/stui"
            cp -r unlocker "release-$platform/stui/"
            cp "$bin" "release-$platform/stui/"

            cd "release-$platform"
            zip -r "../dist/stui-${{ github.ref_name }}-$platform.zip" stui
            cd ..
          done

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          tag_name: ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
